<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PDF Unlocker">
<meta name="theme-color" content="#0e0e0e">
<title>PDF Unlocker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0e0e;--surface:#181818;--surface2:#222;
  --border:#2a2a2a;--border2:#333;
  --text:#f0f0ea;--muted:#888;--hint:#555;
  --accent:#f0c040;--accent-dark:#0e0e0e;
  --success-bg:#071a07;--success-border:#1a4d1a;--success-text:#6fc96f;
  --err-bg:#1a0707;--err-border:#4d1a1a;--err-text:#f08080;
  --info-bg:#181818;--info-border:#333;--info-text:#888;
  --radius:12px;--radius-lg:16px;
}
html{height:100%;background:var(--bg)}
body{
  min-height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:env(safe-area-inset-top,0px) 0 calc(env(safe-area-inset-bottom,0px) + 24px);
}
.shell{width:100%;max-width:440px;padding:0 20px}

/* Header */
.appbar{display:flex;align-items:center;gap:14px;padding:24px 0 28px}
.app-icon{width:52px;height:52px;border-radius:13px;flex-shrink:0}
.appbar h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
.appbar p{font-size:13px;color:var(--muted);margin-top:3px}

/* Install banner */
.install-banner{
  background:linear-gradient(135deg,#1a1500,#151000);
  border:1px solid #3a2e00;border-radius:var(--radius);
  padding:14px 16px;margin-bottom:20px;
  display:none;align-items:center;gap:12px;cursor:pointer;
}
.install-banner.visible{display:flex}
.install-banner-icon{font-size:24px;flex-shrink:0}
.install-banner-text{flex:1}
.install-banner-text strong{font-size:14px;color:var(--accent);display:block;margin-bottom:2px}
.install-banner-text span{font-size:12px;color:#a08020}
.install-banner-btn{
  background:var(--accent);color:var(--accent-dark);
  border:none;border-radius:8px;padding:7px 14px;
  font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;
}

/* Step rows */
.step-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.step-num{
  width:24px;height:24px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border2);
  font-size:12px;font-weight:600;color:var(--muted);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.step-lbl{font-size:13px;font-weight:500;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-family:monospace}

/* Drop zone */
.drop{
  border:1.5px dashed var(--border2);border-radius:var(--radius-lg);
  padding:28px 16px;text-align:center;cursor:pointer;background:var(--surface);
  margin-bottom:24px;position:relative;transition:border-color .15s,background .15s;
  min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.drop.over,.drop:active{border-color:var(--accent);background:#1a1500}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pdf-svg{width:44px;height:52px;margin-bottom:4px}
.drop-lbl{font-size:15px;font-weight:600;color:var(--text)}
.drop-sub{font-size:13px;color:var(--muted)}
.fname{
  font-size:12px;font-family:monospace;color:var(--accent);margin-top:2px;
  max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;
  display:none;
}
.fname.visible{display:block}

/* Divider */
.divider{height:1px;background:var(--border);margin:4px 0 24px}

/* Password field */
.iw{position:relative;margin-bottom:24px}
.iw input{
  width:100%;background:var(--surface);border:1.5px solid var(--border2);
  border-radius:var(--radius);padding:15px 52px 15px 16px;
  color:var(--text);font-family:monospace;font-size:16px;outline:none;
  transition:border-color .15s;-webkit-appearance:none;appearance:none;
}
.iw input:focus{border-color:var(--accent)}
.eye{
  position:absolute;right:0;top:0;height:100%;width:52px;
  display:flex;align-items:center;justify-content:center;
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;
}

/* Button */
.btn{
  width:100%;padding:16px;background:var(--accent);color:var(--accent-dark);
  border:none;border-radius:var(--radius);font-size:16px;font-weight:700;
  cursor:pointer;letter-spacing:.01em;min-height:54px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:opacity .15s,transform .1s;
}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn:not(:disabled):active{transform:scale(.98);opacity:.9}

/* Status */
.st{
  margin-top:16px;padding:14px 16px;border-radius:var(--radius);
  font-size:14px;font-family:monospace;line-height:1.6;display:none;
}
.st.err{background:var(--err-bg);border:1px solid var(--err-border);color:var(--err-text);display:block}
.st.ok{background:var(--success-bg);border:1px solid var(--success-border);color:var(--success-text);display:block}
.st.info{background:var(--info-bg);border:1px solid var(--info-border);color:var(--info-text);display:block}

/* Footer */
.foot{margin-top:28px;text-align:center}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:5px 14px;font-size:12px;color:var(--hint);
}
.offline-dot{width:7px;height:7px;border-radius:50%;background:#4a4a4a;flex-shrink:0}
.offline-dot.online{background:#4caf50}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:20px;height:20px;border-radius:50%;
  border:2.5px solid rgba(0,0,0,.2);border-top-color:#0e0e0e;
  animation:spin .7s linear infinite;flex-shrink:0;
}

/* iOS install hint */
.ios-hint{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:20px;display:none;
}
.ios-hint.visible{display:block}
.ios-hint p{font-size:13px;color:var(--muted);line-height:1.6}
.ios-hint strong{color:var(--text)}
.ios-hint .close-hint{
  float:right;background:none;border:none;color:var(--hint);
  cursor:pointer;font-size:18px;line-height:1;padding:0 0 0 8px;
}
</style>
</head>
<body>
<div class="shell">

  <!-- App header -->
  <div class="appbar">
    <img src="icon-192.png" class="app-icon" alt="PDF Unlocker icon">
    <div>
      <h1>PDF Unlocker</h1>
      <p>Remove password protection</p>
    </div>
  </div>

  <!-- Install banner (Android/desktop) -->
  <div class="install-banner" id="installBanner" onclick="installPWA()">
    <div class="install-banner-icon">📲</div>
    <div class="install-banner-text">
      <strong>Add to Home Screen</strong>
      <span>Install as an app — works offline</span>
    </div>
    <button class="install-banner-btn">Install</button>
  </div>

  <!-- iOS install hint -->
  <div class="ios-hint" id="iosHint">
    <button class="close-hint" onclick="document.getElementById('iosHint').classList.remove('visible')" aria-label="Close">×</button>
    <p>To install on iPhone: tap <strong>Share ↑</strong> → <strong>Add to Home Screen</strong></p>
  </div>

  <!-- Step 1 -->
  <div class="step-row">
    <div class="step-num">1</div>
    <div class="step-lbl">Choose your PDF</div>
  </div>

  <div class="drop" id="drop">
    <input type="file" id="fileInput" accept=".pdf" aria-label="Choose PDF file">
    <svg class="pdf-svg" viewBox="0 0 44 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="44" height="52" rx="6" fill="#222"/>
      <path d="M26 0v13h13" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
      <path d="M26 0 39 13H26V0Z" fill="#2e2e2e"/>
      <rect x="4" y="30" width="36" height="17" rx="4" fill="#c0392b"/>
      <text x="22" y="43" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="white">PDF</text>
      <rect x="6" y="20" width="16" height="2.5" rx="1.2" fill="#f0c040"/>
      <rect x="6" y="25" width="12" height="2" rx="1" fill="#444"/>
    </svg>
    <div class="drop-lbl">Tap to select PDF</div>
    <div class="drop-sub">or drag &amp; drop</div>
    <div class="fname" id="fname"></div>
  </div>

  <div class="divider"></div>

  <!-- Step 2 -->
  <div class="step-row">
    <div class="step-num">2</div>
    <div class="step-lbl">Enter password</div>
  </div>
  <div class="iw">
    <input type="password" id="pw" placeholder="PDF password…"
      autocomplete="current-password" aria-label="PDF password">
    <button class="eye" id="togglePw" type="button" aria-label="Show or hide password">
      <span id="eyeIcon">👁</span>
    </button>
  </div>

  <!-- Step 3 -->
  <div class="step-row">
    <div class="step-num">3</div>
    <div class="step-lbl">Unlock &amp; download</div>
  </div>
  <button class="btn" id="removeBtn" onclick="removePassword()" disabled>
    <span id="btnInner">🔓 Remove Password</span>
  </button>

  <div class="st" id="st" role="status" aria-live="polite"></div>

  <div class="foot">
    <div class="badge">
      <div class="offline-dot" id="offlineDot"></div>
      <span id="offlineLabel">Checking…</span>
    </div>
    <p style="font-size:11px;color:var(--hint);margin-top:8px">Nothing is uploaded — all processing is local</p>
  </div>

</div>

<script src="pdf-lib.min.js"></script>
<script>
// ── Service Worker ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ── PWA Install prompt ──────────────────────────────────────────
let deferredPrompt = null;
const installBanner = document.getElementById('installBanner');
const iosHint = document.getElementById('iosHint');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.classList.add('visible');
});

window.addEventListener('appinstalled', () => {
  installBanner.classList.remove('visible');
  deferredPrompt = null;
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    installBanner.classList.remove('visible');
  });
}

// iOS detection — show manual hint if not already standalone
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
if (isIOS && !isStandalone) {
  iosHint.classList.add('visible');
}

// ── Offline indicator ───────────────────────────────────────────
const dot   = document.getElementById('offlineDot');
const label = document.getElementById('offlineLabel');
function updateOnline() {
  if (navigator.onLine) {
    dot.classList.add('online');
    label.textContent = isStandalone ? 'Running as app · offline ready' : 'Online · offline ready';
  } else {
    dot.classList.remove('online');
    label.textContent = 'Offline mode active';
  }
}
updateOnline();
window.addEventListener('online', updateOnline);
window.addEventListener('offline', updateOnline);

// ── File handling ───────────────────────────────────────────────
const fileInput = document.getElementById('fileInput');
const fname     = document.getElementById('fname');
const removeBtn = document.getElementById('removeBtn');
const stEl      = document.getElementById('st');
const togglePw  = document.getElementById('togglePw');
const eyeIcon   = document.getElementById('eyeIcon');
const pwInput   = document.getElementById('pw');
const drop      = document.getElementById('drop');
let selectedFile = null;

fileInput.addEventListener('change', () => { if (fileInput.files[0]) pick(fileInput.files[0]); });
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') pick(f);
  else setStatus('err', 'Please drop a valid PDF file.');
});

function pick(f) {
  selectedFile = f;
  fname.textContent = f.name;
  fname.classList.add('visible');
  removeBtn.disabled = false;
  setStatus('', '');
}

let pwVisible = false;
togglePw.addEventListener('click', () => {
  pwVisible = !pwVisible;
  pwInput.type = pwVisible ? 'text' : 'password';
  eyeIcon.textContent = pwVisible ? '🙈' : '👁';
});

function setStatus(type, msg) {
  stEl.className = 'st' + (type ? ' ' + type : '');
  stEl.textContent = msg;
}

async function removePassword() {
  if (!selectedFile) { setStatus('err', 'No file selected.'); return; }
  const password = pwInput.value;
  setStatus('info', 'Unlocking…');
  removeBtn.disabled = true;
  document.getElementById('btnInner').innerHTML = '<div class="spinner"></div> Processing…';

  try {
    const buf = await selectedFile.arrayBuffer();
    let pdfDoc;
    try {
      pdfDoc = await PDFLib.PDFDocument.load(buf, { password: password || undefined });
    } catch(err) {
      const msg = err.message || '';
      if (msg.includes('password') || msg.includes('encrypt') || msg.includes('decrypt'))
        setStatus('err', '❌ Wrong password — please try again.');
      else
        setStatus('err', '❌ Could not open: ' + msg);
      reset();
      return;
    }

    const bytes = await pdfDoc.save();
    const blob  = new Blob([bytes], { type: 'application/pdf' });
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement('a');
    a.href      = url;
    a.download  = selectedFile.name.replace(/\.pdf$/i, '') + '_unlocked.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);

    setStatus('ok', '✅ Password removed! Check your Downloads folder.');
    document.getElementById('btnInner').textContent = '✅ Done!';
    setTimeout(reset, 3000);
  } catch(err) {
    setStatus('err', '❌ Error: ' + err.message);
    reset();
  }
}

function reset() {
  removeBtn.disabled = !selectedFile;
  document.getElementById('btnInner').textContent = '🔓 Remove Password';
}
</script>
</body>
</html>
